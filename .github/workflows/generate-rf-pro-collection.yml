name: Generate RF Pro collection

on:
  push:
    branches:
      - pro-collection-v1
    paths:
      - tools/generate_rf_pro_collection.py
      - .github/workflows/generate-rf-pro-collection.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pro-collection-v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python tools/generate_rf_pro_collection.py
      - name: Commit generated themes and releases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add themes releases
          if git diff --cached --quiet; then
            echo "Generated collection already up to date"
          else
            git commit -m "Generate RF Pro theme collection"
            git push origin HEAD:pro-collection-v1
          fi
