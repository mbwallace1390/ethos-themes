name: Generate cancer awareness themes

on:
  push:
    branches:
      - cancer-awareness-themes-v1
    paths:
      - tools/generate_cancer_awareness_themes.py
      - .github/workflows/generate-cancer-awareness-themes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cancer-awareness-themes-v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python tools/generate_cancer_awareness_themes.py
      - name: Commit generated themes, releases, and preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add themes releases previews
          if git diff --cached --quiet; then
            echo "Cancer awareness themes already up to date"
          else
            git commit -m "Generate cancer awareness theme collection"
            git push origin HEAD:cancer-awareness-themes-v1
          fi
