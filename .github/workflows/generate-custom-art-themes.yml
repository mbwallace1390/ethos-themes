name: Generate custom-art themes

on:
  push:
    branches:
      - custom-art-themes-v1
    paths:
      - tools/generate_custom_art_themes.py
      - .github/workflows/generate-custom-art-themes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: custom-art-themes-v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python tools/generate_custom_art_themes.py
      - name: Commit generated themes, releases, and previews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add themes releases previews
          if git diff --cached --quiet; then
            echo "Custom-art themes already up to date"
          else
            git commit -m "Generate custom-art theme collection"
            git push origin HEAD:custom-art-themes-v1
          fi
