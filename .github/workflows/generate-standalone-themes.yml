name: Generate standalone themes

on:
  push:
    branches:
      - standalone-themes-v1
    paths:
      - tools/generate_standalone_themes.py
      - .github/workflows/generate-standalone-themes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: standalone-themes-v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python tools/generate_standalone_themes.py
      - name: Commit generated themes and releases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add themes releases
          if git diff --cached --quiet; then
            echo "Standalone themes already up to date"
          else
            git commit -m "Generate standalone theme collection"
            git push origin HEAD:standalone-themes-v1
          fi
