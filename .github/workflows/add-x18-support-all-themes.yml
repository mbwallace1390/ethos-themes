name: Add X18 support to all themes

on:
  push:
    branches:
      - all-themes-x18-support
    paths:
      - tools/add_x18_support_all_themes.py
      - .github/workflows/add-x18-support-all-themes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: all-themes-x18-support
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python tools/add_x18_support_all_themes.py
      - name: Commit responsive theme assets and packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "All themes already have current X18/X20 support"
          else
            git commit -m "Add automatic X18 support to all themes"
            git push origin HEAD:all-themes-x18-support
          fi
