name: Generate README theme previews

on:
  push:
    branches:
      - rf-pro-readme-preview
    paths:
      - tools/generate_readme_previews.py
      - tools/generate_rf_pro_preview.py
      - .github/workflows/generate-readme-previews.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rf-pro-readme-preview
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python tools/generate_readme_previews.py
      - run: python tools/generate_rf_pro_preview.py
      - name: Commit generated previews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add previews
          if git diff --cached --quiet; then
            echo "README previews already up to date"
          else
            git commit -m "Generate README theme previews"
            git push origin HEAD:rf-pro-readme-preview
          fi
